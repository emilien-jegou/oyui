# git-cliff configuration (used by release-plz under the hood)
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.breaking %}[**breaking**] {% endif %}\
          {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
          {{ commit.message | upper_first }} \
          — [`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/emilien-jegou/oyui/commit/{{ commit.id }}) \
          by {{ commit.author.name }}, {{ commit.author.timestamp | date(format="%Y-%m-%d") }}\
    {% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
backend = "jujutsu"
conventional_commits = true
filter_unconventional = true
split_commits = false

commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^doc|^docs", group = "Documentation" },
  { message = "^style", group = "Styling" },
  { message = "^test", group = "Testing" },
  { message = "^chore|^ci|^build", skip = true },
  { message = "^revert", group = "Reverted" },
]

filter_commits = true
tag_pattern = "v[0-9].*"
