[workspace]
resolver = "2"
members = ["crates/oyui", "crates/oyui-tasker"]

[workspace.dependencies]
ratatui = { version = "0.30", default-features = false, features = ["crossterm"] }
crossterm = "0.29"
imara-diff = "0.2"
syntect = "5.2"
two-face = "0.4"
walkdir = "2.4"
tokio = { version = "1.37", features = ["full"] }
